<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحميل تطبيق - قصي سوفت بقالة المليكي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #0f0f0f 0%, #1a0505 40%, #2d0a0a 70%, #4a0e0e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .card {
            background: linear-gradient(180deg, #faf6f1 0%, #f5efe6 100%);
            max-width: 480px;
            width: 100%;
            padding: 40px 30px;
            border-radius: 30px;
            box-shadow: 0 25px 70px rgba(0,0,0,0.55), 0 0 0 1px rgba(139,0,0,0.08);
            text-align: center;
            border: 1px solid rgba(139,0,0,0.12);
        }
        .logo {
            font-size: 60px;
            background: linear-gradient(135deg, #8B0000 0%, #A52A2A 100%);
            width: 90px;
            height: 90px;
            line-height: 90px;
            border-radius: 50%;
            margin: 0 auto 15px;
            color: #fff;
            box-shadow: 0 8px 25px rgba(139,0,0,0.35);
        }
        h1 { font-size: 28px; color: #4a0e0e; margin-bottom: 5px; }
        .sub { color: #6b4e4e; font-size: 14px; margin-bottom: 25px; }
        .btn {
            background: linear-gradient(135deg, #8B0000 0%, #6b0000 100%);
            color: white; border: none; width: 100%;
            padding: 18px; font-size: 20px; border-radius: 15px;
            cursor: pointer; font-family: 'Cairo', sans-serif;
            font-weight: 700; transition: all 0.3s;
            box-shadow: 0 10px 30px rgba(139,0,0,0.4);
        }
        .btn:hover { 
            background: linear-gradient(135deg, #A52A2A 0%, #8B0000 100%);
            transform: scale(1.02); 
            box-shadow: 0 12px 35px rgba(139,0,0,0.5);
        }
        .btn:disabled { 
            background: #a08080; 
            transform: none; 
            cursor: not-allowed; 
            box-shadow: none;
        }
        #info { margin-top: 15px; font-size: 15px; color: #4a0e0e; line-height: 1.7; }
        .loader {
            display: none; width: 35px; height: 35px;
            margin: 15px auto 0; border: 4px solid #e8ddd5;
            border-top: 4px solid #8B0000; border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .footer { margin-top: 25px; font-size: 12px; color: #8a6a6a; }
        .badge {
            display: inline-block; background: linear-gradient(135deg, #f5efe6 0%, #ede3d6 100%);
            padding: 5px 15px; border-radius: 20px;
            font-size: 13px; color: #8B0000; margin-top: 12px;
            border: 1px solid rgba(139,0,0,0.15);
        }
        .warn { color: #b35900; }
        .ok { color: #6b8e23; }
        .debug { font-size: 11px; color: #9a7a7a; margin-top: 8px; word-break: break-all; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">🛒</div>
        <h1>قصــــــــي سوفــــت بقالة المليكي</h1>
        <p class="sub">لإدخال ديون بقالة المليكي وعرض ديون الزبائن وتقارير متطورة جدا</p>
        <p class="sub">برمجة وتطوير وتصميم قصي المليكي 778010546</p>

        <button class="btn" id="downloadBtn">📲 تحميل التطبيق الآن</button>

        <div id="info"></div>
        <div class="loader" id="loader"></div>
        <div id="badge" class="badge"></div>
        <div class="debug" id="debug"></div>

        <div class="footer">جميع الحقوق محفوظة لدى قصي سوفت © 2026</div>
    </div>

    <script>
        // ==========================================
        // دالة التعرف على المعالج - النهائية
        // ==========================================
        async function getArchitecture() {
            var ua = navigator.userAgent.toLowerCase();
            var platform = (navigator.platform || '').toLowerCase();
            var debugParts = [];

            // ── الطريقة 0: navigator.platform (الأكثر موثوقية!) ──
            // Chrome 64-bit Android: "Linux armv8l" أو "Linux aarch64"
            // Chrome 32-bit Android: "Linux armv7l"
            if (platform) {
                debugParts.push('platform=' + navigator.platform);
                if (platform.indexOf('armv8') !== -1 || platform.indexOf('aarch64') !== -1) {
                    return { apk: 'arm64-v8a', name: '64 بت', method: 'navigator.platform', debug: debugParts };
                }
                if (platform.indexOf('armv7') !== -1) {
                    return { apk: 'armeabi-v7a', name: '32 بت', method: 'navigator.platform', debug: debugParts };
                }
            }

            // ── الطريقة 1: getHighEntropyValues (Chrome 90+) ──
            if (navigator.userAgentData && navigator.userAgentData.getHighEntropyValues) {
                try {
                    var vals = await navigator.userAgentData.getHighEntropyValues(['architecture', 'bitness', 'model']);
                    debugParts.push('uaData=' + JSON.stringify(vals));

                    if (vals.bitness) {
                        var arch = (vals.architecture || '').toLowerCase();
                        var bits = vals.bitness;
                        if ((arch === 'arm' || arch === 'aarch64') && bits === '64') {
                            return { apk: 'arm64-v8a', name: '64 بت', method: 'UAData', debug: debugParts };
                        }
                        if (arch === 'arm' && bits === '32') {
                            return { apk: 'armeabi-v7a', name: '32 بت', method: 'UAData', debug: debugParts };
                        }
                    }
                } catch (e) {
                    debugParts.push('uaDataErr=' + e.message);
                }
            }

            // ── الطريقة 2: userAgent الكامل (للأجهزة القديمة) ──
            if (ua.indexOf('aarch64') !== -1 || ua.indexOf('arm64') !== -1) {
                return { apk: 'arm64-v8a', name: '64 بت', method: 'UserAgent', debug: debugParts };
            }
            if (ua.indexOf('armv7') !== -1 || ua.indexOf('armv7l') !== -1) {
                return { apk: 'armeabi-v7a', name: '32 بت', method: 'UserAgent', debug: debugParts };
            }

            // ── الطريقة 3: طراز الجهاز (قاعدة بيانات موسعة) ──
            var modelMatch = ua.match(/\(([^)]+)\)/);
            if (modelMatch) {
                var m = modelMatch[1].toLowerCase();
                debugParts.push('model=' + m);

                // Samsung 64-bit (S8 فما فوق، Note8 فما فوق، A50s فما فوق...)
                var samsung64 = /sm-g95|sm-g96|sm-g97|sm-g98|sm-g99|sm-n95|sm-n96|sm-n97|sm-n98|sm-f90|sm-f91|sm-a73|sm-a53|sm-a54|sm-a34|sm-s90|sm-m54|sm-m34|sm-m14/;
                // Xiaomi / Redmi / Poco 64-bit
                var xiaomi64 = /mi 9|mi 10|mi 11|mi 12|mi 13|redmi note 9|redmi note 1[0-9]|redmi 1[0-9]|poco f[2-9]|poco x[3-9]|poco m[3-9]/;
                // Google Pixel / OnePlus / Realme / Oppo / Vivo 64-bit
                var other64 = /pixel [3-9]|pixel [a-z]|oneplus [6-9]|oneplus 1[0-9]|realme gt|realme [0-9]+pro|oppo r[1-9][0-9]|vivo v[2-9][0-9]/;
                // Huawei / Honor حديث
                var huawei64 = /huawei p[3-9][0-9]|huawei mate [3-9][0-9]|honor [2-9][0-9]|nova [5-9]/;

                if (samsung64.test(m) || xiaomi64.test(m) || other64.test(m) || huawei64.test(m)) {
                    return { apk: 'arm64-v8a', name: '64 بت', method: 'طراز الجهاز', debug: debugParts };
                }
            }

            // ── الطريقة 4: Android 10+ غالباً 64-bit ──
            var androidVer = ua.match(/android\s+(\d+)/);
            if (androidVer) {
                var v = parseInt(androidVer[1]);
                debugParts.push('android=' + v);
                if (v >= 12) {
                    // Android 12+ يتطلب 64-bit تقريباً للأجهزة الجديدة
                    return { apk: 'arm64-v8a', name: '64 بت', method: 'Android 12+', debug: debugParts };
                }
            }

            // ── افتراض آمن: 32-bit يعمل على الجميع ──
            return { 
                apk: 'armeabi-v7a', 
                name: '32 بت (عام)', 
                method: 'افتراضي آمن',
                note: 'النسخة 32 بتن تعمل على جميع الأجهزة بما فيها 64 بت',
                debug: debugParts
            };
        }

        // ==========================================
        // حدث الضغط
        // ==========================================
        document.getElementById('downloadBtn').addEventListener('click', async function() {
            var btn = document.getElementById('downloadBtn');
            var info = document.getElementById('info');
            var loader = document.getElementById('loader');
            var badge = document.getElementById('badge');
            var debug = document.getElementById('debug');

            btn.disabled = true;
            btn.textContent = '⏳ جاري التعرف...';
            loader.style.display = 'block';
            info.innerHTML = '';
            badge.textContent = '';
            debug.textContent = '';

            var result = await getArchitecture();

            badge.textContent = 'جهازك: ' + result.name + ' | طريقة: ' + result.method;

            var msg = '<span class="ok">✓ تم التعرف</span>';
            if (result.note) msg += '<br><span class="warn">' + result.note + '</span>';
            info.innerHTML = msg;
            debug.textContent = result.debug.join(' | ');

            btn.textContent = '⬇️ جاري تحميل ' + result.apk + '...';

            var url = 'https://github.com/QUSAI-ALPRINS/markt-download/releases/download/v135.0.0+135/app-' + result.apk + '.apk';
            window.location.href = url;

            setTimeout(function() {
                btn.disabled = false;
                btn.textContent = '📲 تحميل التطبيق الآن';
                loader.style.display = 'none';
                info.innerHTML += '<br><br>إذا لم يبدأ: <a href="' + url + '" style="color:#8B0000;font-weight:bold;">اضغط هنا</a>';
            }, 1500);
        });
    </script>
</body>
</html>
